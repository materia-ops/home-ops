---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: azerothcore
spec:
  chartRef:
    kind: OCIRepository
    name: azerothcore
  # The wow-panel (and manual kubectl) scale these Deployments 0↔1; without
  # the replicas ignore, cluster-wide drift detection reverts every scale
  # within the reconcile interval (precedent: media/arr-apps/bazarr-anime).
  driftDetection:
    mode: enabled
    ignore:
      - paths: [/spec/replicas]
  interval: 1h
  values:
    controllers:
      authserver:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        containers:
          app:
            nameOverride: authserver
            image: &image
              repository: ghcr.io/materia-ops/azerothcore-wotlk-playerbots
              tag: 1.7.1@sha256:fce169bd0ec8872e4e7654285499a4115629080cee52f0287cc0e244fce361fa
            # Image CMD is worldserver; same image runs both servers.
            command: ["authserver"]
            env:
              AC_LOGIN_DATABASE_INFO:
                valueFrom:
                  secretKeyRef:
                    name: azerothcore-secret
                    key: AC_LOGIN_DATABASE_INFO
              TZ: Australia/Melbourne
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            probes:
              liveness: &authProbe
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3724
                  periodSeconds: 30
              readiness: *authProbe
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3724
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
      worldserver:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        # RWO client-data PVC: the replacement pod can't mount until the old
        # one is gone.
        strategy: Recreate
        pod:
          # Budget = preStop hook (900s in-game restart countdown when real
          # players are online + 120s hold margin — see
          # scripts/prestop-restart-warning.sh) + SIGTERM save time (~180s:
          # worldserver flushes character/bot state to the DB — generous on
          # purpose, do not shorten). Image runs worldserver as PID 1
          # (exec-form CMD, no shell wrapper). With nobody online the hook
          # returns immediately and only the save time is used.
          terminationGracePeriodSeconds: 1200
        containers:
          app:
            nameOverride: worldserver
            image: *image
            env:
              # AH-bot activation (05 §3/§8): numeric IDs, not secrets — the
              # `ahbot` account (acore_auth.account.id) and its character
              # (acore_characters.characters.guid), created by WP9. The bot
              # is inert while these override the conf's zeros.
              AC_AUCTION_HOUSE_BOT_ACCOUNT: "72"
              AC_AUCTION_HOUSE_BOT_GUID: "701"
              TZ: Australia/Melbourne
            envFrom:
              # The four AC_*_DATABASE_INFO DSNs + SOAP_USERNAME/SOAP_PASSWORD
              # (the preStop hook's SOAP login; non-AC_ names are invisible to
              # AzerothCore's env-override config reader)
              - secretRef:
                  name: azerothcore-secret
            # In-game 15-min restart warning before any orchestrated
            # termination, skipped when no real players are online.
            # Emergency bypass: kubectl delete pod --grace-period=1
            lifecycle:
              preStop:
                exec:
                  command: ["/bin/bash", "/scripts/prestop-restart-warning.sh"]
            securityContext: *securityContext
            probes:
              # Liveness goes through SOAP (`server info` executes on the
              # world update loop) because a hung loop keeps 8085 accepting —
              # TCP alone can't see the realm's most likely failure mode.
              # 5 × 60s + the script's 15s SOAP budget ≈ 5 min unresponsive
              # before a restart; lag spikes (mass bot login) stay safe.
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["/bin/bash", "/scripts/liveness-soap.sh"]
                  periodSeconds: 60
                  timeoutSeconds: 20
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8085
                  periodSeconds: 30
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8085
                  # 120 × 10 s = 20 min boot budget: first boot applies module
                  # SQL and 300 random bots log in before the world socket
                  # opens; liveness only applies after startup succeeds.
                  failureThreshold: 120
                  periodSeconds: 10
            resources:
              requests:
                cpu: 1
                memory: 5Gi
              limits:
                memory: 8Gi
    defaultPodOptions:
      imagePullSecrets:
        - name: ghcr-pull-secret
      # Defined in azerothcore-db (which this app dependsOn): under node
      # pressure the realm pods are evicted after ordinary workloads.
      priorityClassName: azerothcore-critical
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      auth:
        controller: authserver
        type: LoadBalancer
        annotations:
          # gatus-sidecar (service kind is opt-in, no auto): probe the VIP —
          # the same path a player's client takes. Group `games` is
          # deliberately outside the GatusEndpointDown rule's external|services
          # match: deliberate scale-to-0 via the panel must not page; the
          # replica-guarded alert lives in prometheusrule.yaml.
          gatus.home-operations.com/enabled: "true"
          gatus.home-operations.com/endpoint: |-
            name: wow-auth
            group: games
            url: tcp://192.168.10.120:3724
            interval: 1m
            conditions: ["[CONNECTED] == true"]
          # Players' realmlist.wtf uses the name `wow.internal` → this VIP.
          # That record is MANUAL on the Pi-holes (owner-created/preferred) —
          # an external-dns hostname annotation can't manage it: every LAN
          # instance filters to materia.wtf (domainFilters), so an .internal
          # annotation is silently dropped.
          # Both game Services share the realm VIP (WP8 validated live);
          # the VIP is permanent — it's baked into the DB realmlist row.
          lbipam.cilium.io/ips: 192.168.10.120
          lbipam.cilium.io/sharing-key: azerothcore
        ports:
          auth:
            port: 3724
      soap:
        # ClusterIP ONLY — SOAP is the admin path (account creation, GM
        # commands, player counts) and must never be exposed via
        # LoadBalancer or HTTPRoute.
        controller: worldserver
        ports:
          soap:
            port: 7878
      world:
        controller: worldserver
        type: LoadBalancer
        annotations:
          # See the auth service's gatus comment.
          gatus.home-operations.com/enabled: "true"
          gatus.home-operations.com/endpoint: |-
            name: wow-world
            group: games
            url: tcp://192.168.10.120:8085
            interval: 1m
            conditions: ["[CONNECTED] == true"]
          lbipam.cilium.io/ips: 192.168.10.120
          lbipam.cilium.io/sharing-key: azerothcore
        ports:
          world:
            port: 8085
    persistence:
      client-data:
        # Populated once by the WP2 extraction (maps/vmaps/mmaps/dbc/cameras
        # + VERSION marker); worldserver only ever reads it.
        existingClaim: azerothcore-client-data
        advancedMounts:
          worldserver:
            app:
              - path: /azerothcore/data
                readOnly: true
      config:
        type: configMap
        name: azerothcore-config
        advancedMounts:
          authserver:
            app:
              - path: /azerothcore/etc/authserver.conf
                subPath: authserver.conf
                readOnly: true
          worldserver:
            app:
              - path: /azerothcore/etc/modules/CFBG.conf
                subPath: CFBG.conf
                readOnly: true
              - path: /azerothcore/etc/modules/mod_account_mount.conf
                subPath: mod_account_mount.conf
                readOnly: true
              - path: /azerothcore/etc/modules/mod_achievements.conf
                subPath: mod_achievements.conf
                readOnly: true
              - path: /azerothcore/etc/modules/mod_ahbot.conf
                subPath: mod_ahbot.conf
                readOnly: true
              - path: /azerothcore/etc/modules/mod_ale.conf
                subPath: mod_ale.conf
                readOnly: true
              - path: /azerothcore/etc/modules/mod_aoe_loot.conf
                subPath: mod_aoe_loot.conf
                readOnly: true
              - path: /azerothcore/etc/modules/mod_ollama_chat.conf
                subPath: mod_ollama_chat.conf
                readOnly: true
              - path: /azerothcore/etc/modules/MultiBotBridge.conf
                subPath: MultiBotBridge.conf
                readOnly: true
              - path: /azerothcore/etc/modules/playerbots.conf
                subPath: playerbots.conf
                readOnly: true
              - path: /azerothcore/etc/modules/transmog.conf
                subPath: transmog.conf
                readOnly: true
              - path: /azerothcore/etc/worldserver.conf
                subPath: worldserver.conf
                readOnly: true
      logs:
        type: emptyDir
        globalMounts:
          - path: /azerothcore/logs
      lua-scripts:
        # ALE.ScriptPath — empty today; future Lua lands via git in
        # app/lua_scripts/, no image rebuild.
        type: configMap
        name: azerothcore-lua-scripts
        advancedMounts:
          worldserver:
            app:
              - path: /azerothcore/lua_scripts
                readOnly: true
      scripts:
        type: configMap
        name: azerothcore-scripts
        advancedMounts:
          worldserver:
            app:
              - path: /scripts
                readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
