---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Renovate

on:
  push:
    branches:
      - main
    paths:
      - .renovaterc.json5
      - .renovate/**.json5
  schedule:
    - cron: 20 * * * *
  workflow_dispatch:
    inputs:
      dryRun:
        description: Dry Run
        type: boolean
        default: false
        required: true
      logLevel:
        description: Log Level
        type: choice
        default: debug
        options:
          - debug
          - info
        required: true
      version:
        description: Renovate Version
        default: latest
        required: true
  repository_dispatch:
    # Fired by the source repos (raidscope, wow-panel, azerothcore-image)
    # the moment they publish a new image, so the bump PR is opened right away
    # instead of waiting up to an hour for the schedule above.
    types: [image-published]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  main:
    name: Renovate
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Load Secrets
        id: load-secrets
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1 # zizmor: ignore[unpinned-tools]
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          GITHUB_BOT_APP_CLIENT_ID: op://ci/github-bot/GITHUB_BOT_APP_CLIENT_ID
          GITHUB_BOT_APP_PRIVATE_KEY: op://ci/github-bot/GITHUB_BOT_APP_PRIVATE_KEY
          RENOVATE_GHCR_TOKEN: op://ci/ghcr-pull/token

      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ steps.load-secrets.outputs.GITHUB_BOT_APP_CLIENT_ID }}
          private-key: ${{ steps.load-secrets.outputs.GITHUB_BOT_APP_PRIVATE_KEY }}
          permission-checks: write
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-statuses: write
          permission-vulnerability-alerts: read
          # workflows:write is load-bearing: the github-actions manager bumps
          # SHA-pinned actions inside .github/workflows/** (audited 2026-07-18,
          # security review #8 - do not drop without disabling that manager).
          permission-workflows: write
          # Renovate also manages the azerothcore-image source pins
          # (versions.json git-refs manager), wow-panel's npm/actions/base
          # image, raidscope's pip/actions/base image, materia-core's
          # npm/actions, and wow-realmchat's nuget/actions/Ollama pin; the
          # github-bot App must be INSTALLED on those repos or token
          # generation fails. .github is the org config repo: every fleet
          # repo extends github>materia-ops/.github//renovate/default, and
          # renovate resolves that preset with THIS token - without .github
          # in scope the fetch 404s and every repo aborts as "invalid config".
          repositories: |
            ${{ github.event.repository.name }}
            .github
            azerothcore-image
            raidscope
            materia-core
            wow-panel
            wow-realmchat

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - name: Run Renovate
        uses: renovatebot/github-action@3064367f740a1a91cca218698a63902689cce200 # v46.1.20
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'debug' }}
          RENOVATE_AUTODISCOVER: true
          RENOVATE_AUTODISCOVER_FILTER: ${{ github.repository }},${{ github.repository_owner }}/azerothcore-image,${{ github.repository_owner }}/raidscope,${{ github.repository_owner }}/materia-core,${{ github.repository_owner }}/wow-panel,${{ github.repository_owner }}/wow-realmchat
          RENOVATE_DRY_RUN: ${{ inputs.dryRun }}
          RENOVATE_INTERNAL_CHECKS_FILTER: strict
          RENOVATE_PLATFORM: github
          RENOVATE_PLATFORM_COMMIT: true
          RENOVATE_HOST_RULES: '[{"matchHost": "ghcr.io", "hostType": "docker", "username": "malpractis", "password": "${{ steps.load-secrets.outputs.RENOVATE_GHCR_TOKEN }}"}]'
        with:
          token: ${{ steps.app-token.outputs.token }}
          renovate-version: ${{ inputs.version || '43.280.0' }}
